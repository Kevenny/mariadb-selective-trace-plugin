version: "3.8"

services:
  # ---------------------------------------------------------------------
  # Container de desenvolvimento: fonte do MariaDB + toolchain + Claude Code
  # ---------------------------------------------------------------------
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mariadb-plugin-dev
    volumes:
      - ..:/workspace
      - mariadb-src:/opt/mariadb-src
      - mariadb-build:/opt/mariadb-build
      - ccache-data:/opt/ccache
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - MARIADB_VERSION=11.4.4
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "3306:3306"     # MariaDB (quando o mysqld de teste subir)
      - "3307:3307"     # porta alternativa para segunda instância de teste
    networks:
      - plugin-dev-net

  # ---------------------------------------------------------------------
  # Build para Oracle Linux / RHEL 8+ (glibc 2.28): gera o .so carregável
  # em MariaDB 11.4.x instalado via RPM em EL8/EL9.
  #   docker compose -f docker/docker-compose.yml --profile ol8 up -d dev-ol8
  #   docker exec mariadb-plugin-dev-ol8 bash -lc 'cd /workspace && ./scripts/build.sh full'
  # ---------------------------------------------------------------------
  dev-ol8:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ol8
    container_name: mariadb-plugin-dev-ol8
    volumes:
      - ..:/workspace
      - mariadb-src:/opt/mariadb-src
      - mariadb-build-ol8:/opt/mariadb-build-ol8
      - ccache-ol8:/opt/ccache
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - MARIADB_VERSION=11.4.4
      - BUILD_DIR=/opt/mariadb-build-ol8
      - PLUGIN_OUTPUT_DIR=/workspace/build/plugin_output-ol8
    networks:
      - plugin-dev-net
    profiles:
      - ol8

  # ---------------------------------------------------------------------
  # Build para MariaDB 12.3+ em Oracle Linux / RHEL 8+ (audit interface
  # 0x0303). Fonte, build e ccache em volumes próprios — o .so 11.4 (0x0302)
  # NÃO é ABI-compatível com o servidor 12.3, então precisa deste build.
  #   docker compose -f docker/docker-compose.yml --profile v123 up -d --build dev-123-ol8
  #   docker exec mariadb-plugin-dev-123-ol8 bash -lc \
  #     './scripts/download-mariadb-source.sh && ./scripts/build.sh full && ./scripts/build.sh --package'
  # ---------------------------------------------------------------------
  dev-123-ol8:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ol8
    container_name: mariadb-plugin-dev-123-ol8
    volumes:
      - ..:/workspace
      - mariadb-src-123:/opt/mariadb-src-123
      - mariadb-build-123-ol8:/opt/mariadb-build-123-ol8
      - ccache-123-ol8:/opt/ccache
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - MARIADB_VERSION=12.3.2
      - MARIADB_SRC_DIR=/opt/mariadb-src-123
      - BUILD_DIR=/opt/mariadb-build-123-ol8
      - PLUGIN_OUTPUT_DIR=/workspace/build/plugin_output-123-ol9
    networks:
      - plugin-dev-net
    profiles:
      - v123

  # ---------------------------------------------------------------------
  # Container "limpo" apenas para validar o plugin compilado, simulando
  # um ambiente de produção MariaDB 11.4.4 oficial
  # ---------------------------------------------------------------------
  mariadb-test:
    image: mariadb:11.4.4
    container_name: mariadb-plugin-test
    environment:
      - MARIADB_ROOT_PASSWORD=devpassword
      - MARIADB_DATABASE=testdb
    volumes:
      # mariadbd não aceita subdiretório em plugin-load-add ("No paths allowed
      # for shared library"), então o .so é montado direto no plugin_dir
      - ../build/plugin_output/selective_trace.so:/usr/lib/mysql/plugin/selective_trace.so:ro
      - ../docker/test-my.cnf:/etc/mysql/conf.d/plugin-test.cnf:ro
    ports:
      - "3308:3306"
    networks:
      - plugin-dev-net
    profiles:
      - test

volumes:
  mariadb-src:
  mariadb-src-123:
  mariadb-build:
  mariadb-build-ol8:
  mariadb-build-123-ol8:
  ccache-data:
  ccache-ol8:
  ccache-123-ol8:

networks:
  plugin-dev-net:
    driver: bridge
